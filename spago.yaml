# Lua fork of purescript-partial. Builds against the published purescript-lua
# package set (the Lua forks override their JavaScript-targeting upstreams).
#
# A no-op backend (`true`) makes spago compile with `--codegen corefn` rather
# than JS: the FFI here is Lua, not JavaScript. scripts/build then runs pslua
# over the emitted corefn to produce dist/*.lua.
package:
  name: lua-partial
  dependencies: []
workspace:
  backend:
    cmd: "true"
  packageSet:
    url: https://github.com/purescript-lua/purescript-lua-package-sets/releases/download/psc-0.15.15-20260624/packages.json
